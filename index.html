<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Juri Cinematography AMBK</title>
    
    <!-- Memuat Tailwind CSS untuk Desain -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Memuat React dan Babel untuk fungsionalitas aplikasi -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 font-sans pb-32">
    <!-- Tempat aplikasi React akan dimuat -->
    <div id="root"></div>

    <!-- Script Aplikasi (Ditulis dalam React/JSX) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DATA DEFAULT ---
        const defaultRubrics = [
            { id: 'tema', title: '1. Kesesuaian Tema "OLYMPUS"', max: 25, desc: 'Representasi puncak kejayaan.', levelHigh: 'Sangat Baik', levelMid: 'Cukup', levelLow: 'Kurang' },
            { id: 'kreativitas', title: '2. Kreativitas Isi Konten', max: 30, desc: 'Variasi shot & penceritaan.', levelHigh: 'Sangat Baik', levelMid: 'Cukup', levelLow: 'Kurang' },
            { id: 'audio', title: '3. Kejelasan Audio', max: 15, desc: 'Dialog & Musik latar.', levelHigh: 'Sangat Baik', levelMid: 'Cukup', levelLow: 'Kurang' },
            { id: 'kontras', title: '4. Kontras Warna', max: 15, desc: 'Exposure, Shadow, Highlight.', levelHigh: 'Sangat Baik', levelMid: 'Cukup', levelLow: 'Kurang' },
            { id: 'warna', title: '5. Keterpaduan Warna', max: 15, desc: 'Color Grading & Skintone.', levelHigh: 'Sangat Baik', levelMid: 'Cukup', levelLow: 'Kurang' }
        ];

        const defaultDqRules = [
            "Durasi melebihi 5 Menit 00 Detik.",
            "Mengandung unsur SARA / Melanggar Hak Cipta.",
            "Footage ILEGAL (bukan dari take hari 1-3 di Google Drive).",
            "Dibantu pihak luar / pakai template project dari luar."
        ];

        function App() {
            // State Pengaturan (Dengan Local Storage)
            const [config, setConfig] = useState(() => {
                const savedConfig = localStorage.getItem('juriConfig_ambk');
                if (savedConfig) return JSON.parse(savedConfig);
                return {
                    competitionName: "AMBK SMAN 5 Makassar - 10 Mei 2026",
                    appName: "E-Juri Cinematography",
                    bonusTitle: "Bonus Media Sosial",
                    bonusDesc: "Diberikan oleh panitia untuk Likes terbanyak.",
                    bonusPoints: 10,
                    rubrics: [...defaultRubrics],
                    dqRules: [...defaultDqRules]
                };
            });

            // State UI & Input
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [sekolah, setSekolah] = useState('');
            const [judul, setJudul] = useState('');
            const [scores, setScores] = useState({});
            const [bonus, setBonus] = useState(false);
            const [dqChecks, setDqChecks] = useState([]);
            const [catatan, setCatatan] = useState('');
            
            // State Riwayat (Dengan Local Storage)
            const [history, setHistory] = useState(() => {
                const savedHistory = localStorage.getItem('juriHistory_ambk');
                if (savedHistory) return JSON.parse(savedHistory);
                return [];
            });

            // Simpan otomatis ke Local Storage saat berubah
            useEffect(() => {
                localStorage.setItem('juriConfig_ambk', JSON.stringify(config));
            }, [config]);

            useEffect(() => {
                localStorage.setItem('juriHistory_ambk', JSON.stringify(history));
            }, [history]);

            // Inisialisasi awal skor form
            useEffect(() => {
                const initialScores = {};
                config.rubrics.forEach(r => initialScores[r.id] = 0);
                setScores(initialScores);
                setDqChecks(new Array(config.dqRules.length).fill(false));
            }, [config.rubrics, config.dqRules]);

            // Hitung Level
            const getDynamicLevel = (maxScore, currentScore) => {
                const percentage = currentScore / maxScore;
                if (percentage >= 0.75) return { label: 'Sangat Baik', color: 'text-green-600' };
                if (percentage >= 0.40) return { label: 'Cukup', color: 'text-yellow-600' };
                return { label: 'Kurang', color: 'text-red-600' };
            };

            // Hitung Skor
            const isDq = dqChecks.some(check => check === true);
            const totalScoreBase = Object.values(scores).reduce((a, b) => a + (parseInt(b) || 0), 0);
            const maxPossibleScore = config.rubrics.reduce((a, b) => a + parseInt(b.max), 0) + parseInt(config.bonusPoints);
            const finalScore = isDq ? 0 : totalScoreBase + (bonus ? parseInt(config.bonusPoints) : 0);

            // Simpan Penilaian Baru
            const handleSave = () => {
                if (!sekolah) { alert("Masukkan Asal Sekolah terlebih dahulu!"); return; }
                const newRecord = {
                    id: Date.now(), sekolah, judul, scores: { ...scores }, bonus, isDq, finalScore, catatan, timestamp: new Date().toLocaleTimeString()
                };
                setHistory([newRecord, ...history]);
                
                // Reset form
                setSekolah(''); setJudul('');
                const resetScores = {}; config.rubrics.forEach(r => resetScores[r.id] = 0);
                setScores(resetScores); setBonus(false);
                setDqChecks(new Array(config.dqRules.length).fill(false)); setCatatan('');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Export ke Word yang Rapi
            const exportToWord = () => {
                if (history.length === 0) { alert("Belum ada data untuk diunduh!"); return; }

                let tableHeaders = `<th width="8%">Waktu</th><th width="12%">Sekolah</th><th width="15%">Judul</th>`;
                config.rubrics.forEach(r => { tableHeaders += `<th width="7%">${r.title.substring(0,15)}..</th>`; });
                tableHeaders += `<th width="6%">Bonus</th><th width="6%">Total</th><th width="8%">Status</th><th width="15%">Catatan</th>`;

                let tableRows = '';
                history.forEach(row => {
                    let rowHtml = `<tr>
                        <td>${row.timestamp}</td>
                        <td><strong>${row.sekolah}</strong></td>
                        <td>${row.judul || '-'}</td>`;
                    config.rubrics.forEach(r => { rowHtml += `<td align="center">${row.scores[r.id] || 0}</td>`; });
                    rowHtml += `<td align="center">${row.bonus ? config.bonusPoints : 0}</td>
                        <td align="center"><strong>${row.finalScore}</strong></td>
                        <td style="color: ${row.isDq ? 'red' : 'green'}; font-weight: bold;">${row.isDq ? 'DISKUALIFIKASI' : 'SAH'}</td>
                        <td>${row.catatan ? row.catatan.replace(/\n/g, '<br>') : '-'}</td>
                    </tr>`;
                    tableRows += rowHtml;
                });

                const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Rekap Nilai</title>
                <style>
                    @page WordSection1 { size: 841.9pt 595.3pt; margin: 0.5in; mso-header-margin: .5in; mso-footer-margin: .5in; mso-paper-source: 0; }
                    div.WordSection1 { page: WordSection1; }
                    body { font-family: 'Arial', sans-serif; font-size: 9pt; }
                    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
                    th, td { border: 1pt solid #000; padding: 4px; vertical-align: middle; word-wrap: break-word; }
                    th { background-color: #eee; font-weight: bold; text-align: center; }
                    h2 { text-align: center; margin-bottom: 5px; }
                </style></head>
                <body><div class="WordSection1">
                    <h2>Rekapitulasi Penilaian ${config.competitionName}</h2>
                    <p style="text-align:center">Dicetak: ${new Date().toLocaleString()}</p><br>
                    <table><thead><tr>${tableHeaders}</tr></thead><tbody>${tableRows}</tbody></table>
                </div></body></html>`;

                const blob = new Blob(['\uFEFF', htmlContent], { type: 'application/msword' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `Rekap_Nilai_${new Date().toISOString().slice(0,10)}.doc`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            // === TAMPILAN PENGATURAN ===
            if (isSettingsOpen) {
                return (
                    <div className="min-h-screen bg-slate-50 font-sans pb-32">
                        <header className="bg-slate-900 text-white p-4 sticky top-0 z-10 flex items-center shadow-md">
                            <button onClick={() => setIsSettingsOpen(false)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg mr-3">
                                <i className="fas fa-chevron-left"></i>
                            </button>
                            <h1 className="text-lg font-bold">Pengaturan Aplikasi</h1>
                        </header>
                        
                        <main className="max-w-3xl mx-auto p-4 space-y-6 mt-4">
                            {/* Info Umum */}
                            <section className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <h2 className="font-bold text-slate-800 mb-4 border-b pb-2"><i className="fas fa-cog text-slate-500 mr-2"></i> Info Lomba</h2>
                                <div className="space-y-3">
                                    <label className="block text-xs font-bold text-slate-500 uppercase">Nama Aplikasi</label>
                                    <input type="text" value={config.appName} onChange={(e) => setConfig({...config, appName: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none" />
                                    <label className="block text-xs font-bold text-slate-500 uppercase">Nama Lomba / Tanggal</label>
                                    <input type="text" value={config.competitionName} onChange={(e) => setConfig({...config, competitionName: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none" />
                                </div>
                            </section>

                            {/* Kriteria */}
                            <section className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center border-b pb-2 mb-4">
                                    <h2 className="font-bold text-slate-800"><i className="fas fa-award text-blue-500 mr-2"></i> Kriteria Penilaian</h2>
                                    <button onClick={() => setConfig({...config, rubrics: [...config.rubrics, { id: Date.now().toString(), title: 'Baru', max: 10, desc: 'Deskripsi' }]})} className="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-sm font-bold"><i className="fas fa-plus mr-1"></i> Tambah</button>
                                </div>
                                <div className="space-y-4">
                                    {config.rubrics.map((rubric, index) => (
                                        <div key={rubric.id} className="p-3 bg-slate-50 border rounded-lg relative">
                                            <button onClick={() => { const newR = [...config.rubrics]; newR.splice(index, 1); setConfig({...config, rubrics: newR}); }} className="absolute top-3 right-3 text-red-500"><i className="fas fa-trash"></i></button>
                                            <div className="grid grid-cols-4 gap-2 pr-6">
                                                <div className="col-span-3"><label className="text-xs font-bold text-slate-500">Kriteria</label><input type="text" value={rubric.title} onChange={(e) => { const newR = [...config.rubrics]; newR[index].title = e.target.value; setConfig({...config, rubrics: newR}); }} className="w-full p-2 border rounded font-bold" /></div>
                                                <div className="col-span-1"><label className="text-xs font-bold text-slate-500">Maks</label><input type="number" value={rubric.max} onChange={(e) => { const newR = [...config.rubrics]; newR[index].max = parseInt(e.target.value)||0; setConfig({...config, rubrics: newR}); }} className="w-full p-2 border rounded font-bold text-blue-600" /></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* Tombol Hapus Semua Data */}
                            <div className="pt-4">
                                <button onClick={() => {
                                    if(confirm("AWAS! Ini akan menghapus SEMUA riwayat dan mengembalikan pengaturan ke awal. Lanjutkan?")) {
                                        localStorage.removeItem('juriHistory_ambk');
                                        localStorage.removeItem('juriConfig_ambk');
                                        window.location.reload();
                                    }
                                }} className="w-full bg-red-100 hover:bg-red-200 text-red-700 p-3 rounded-lg font-bold shadow-sm transition-colors">
                                    <i className="fas fa-exclamation-triangle mr-2"></i> Reset & Hapus Semua Data Aplikasi
                                </button>
                            </div>
                        </main>
                    </div>
                );
            }

            // === TAMPILAN UTAMA JURI ===
            return (
                <div>
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-4 sticky top-0 z-10 shadow-md">
                        <div className="max-w-3xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <i className="fas fa-video text-2xl text-blue-400"></i>
                                <div>
                                    <h1 className="text-lg md:text-xl font-bold">{config.appName}</h1>
                                    <p className="text-xs text-slate-300">{config.competitionName}</p>
                                </div>
                            </div>
                            <button onClick={() => setIsSettingsOpen(true)} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-full"><i className="fas fa-cog"></i></button>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 space-y-6 mt-2">
                        {/* Form Identitas */}
                        <section className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                            <h2 className="text-lg font-bold text-slate-800 mb-4"><i className="fas fa-file-alt text-blue-500 mr-2"></i> Identitas Peserta</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label className="block text-sm font-bold text-slate-700 mb-1">Sekolah *</label><input type="text" value={sekolah} onChange={(e) => setSekolah(e.target.value)} placeholder="Contoh: SMAN 5 Makassar" className="w-full p-2 border rounded-lg focus:ring-2 outline-none" /></div>
                                <div><label className="block text-sm font-bold text-slate-700 mb-1">Judul Karya</label><input type="text" value={judul} onChange={(e) => setJudul(e.target.value)} className="w-full p-2 border rounded-lg focus:ring-2 outline-none" /></div>
                            </div>
                        </section>

                        {/* Slider Penilaian */}
                        <section className="space-y-4">
                            <h2 className="text-lg font-bold text-slate-800"><i className="fas fa-award text-blue-500 mr-2"></i> Penilaian Juri</h2>
                            {config.rubrics.map((rubric) => {
                                const currentScore = scores[rubric.id] || 0;
                                const lvl = getDynamicLevel(rubric.max, currentScore);
                                return (
                                    <div key={rubric.id} className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h3 className="font-bold">{rubric.title}</h3>
                                                <p className="text-xs text-slate-500">{rubric.desc}</p>
                                            </div>
                                            <div className="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg font-bold text-lg">{currentScore} <span className="text-xs font-normal">/ {rubric.max}</span></div>
                                        </div>
                                        <input type="range" min="0" max={rubric.max} value={currentScore} onChange={(e) => setScores({...scores, [rubric.id]: parseInt(e.target.value) || 0})} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600 my-4" />
                                        <p className={`text-sm font-bold ${lvl.color}`}>{lvl.label}</p>
                                    </div>
                                );
                            })}
                        </section>

                        {/* Bonus & DQ */}
                        <section className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-blue-50 p-5 rounded-xl border border-blue-200">
                                <h3 className="font-bold text-blue-800 mb-3"><i className="fas fa-thumbs-up mr-2"></i> {config.bonusTitle}</h3>
                                <label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={bonus} onChange={(e) => setBonus(e.target.checked)} className="w-6 h-6 rounded" /><span className="font-bold">Tambahkan +{config.bonusPoints} Poin</span></label>
                            </div>
                            <div className="bg-red-50 p-5 rounded-xl border border-red-200">
                                <h3 className="font-bold text-red-800 mb-3"><i className="fas fa-exclamation-triangle mr-2"></i> Diskualifikasi</h3>
                                <div className="space-y-2">
                                    {config.dqRules.map((rule, idx) => (
                                        <label key={idx} className="flex items-start gap-2 cursor-pointer"><input type="checkbox" checked={dqChecks[idx]||false} onChange={(e) => { const newC = [...dqChecks]; newC[idx] = e.target.checked; setDqChecks(newC); }} className="w-4 h-4 mt-0.5" /><span className="text-xs">{rule}</span></label>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Catatan */}
                        <section className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                            <h2 className="text-lg font-bold mb-3"><i className="fas fa-clock text-blue-500 mr-2"></i> Catatan & Timecode</h2>
                            <textarea rows="2" value={catatan} onChange={(e) => setCatatan(e.target.value)} placeholder="02:15 audio bocor..." className="w-full p-3 border rounded-lg focus:ring-2 outline-none text-sm"></textarea>
                        </section>

                        {/* Riwayat */}
                        {history.length > 0 && (
                            <section className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-bold"><i className="fas fa-check-circle text-green-500 mr-2"></i> Riwayat</h2>
                                    <button onClick={exportToWord} className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-bold text-sm"><i className="fas fa-download mr-1"></i> Unduh Word</button>
                                </div>
                                <div className="space-y-3">
                                    {history.map(record => (
                                        <div key={record.id} className="p-3 bg-slate-50 border rounded-lg flex justify-between items-center">
                                            <div>
                                                <p className="font-bold">{record.sekolah}</p>
                                                <p className="text-xs text-slate-500">{record.timestamp}</p>
                                                {record.isDq && <span className="text-xs font-bold text-red-600 bg-red-100 px-2 rounded">DISKUALIFIKASI</span>}
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <p className={`font-black text-xl ${record.isDq ? 'text-red-600' : ''}`}>{record.finalScore}</p>
                                                <button onClick={() => { if(confirm("Hapus?")) setHistory(history.filter(h=>h.id!==record.id)); }} className="text-red-500"><i className="fas fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Footer Nav */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-20">
                        <div className="max-w-3xl mx-auto flex justify-between items-center">
                            <div>
                                <p className="text-xs text-slate-500 font-bold">TOTAL SKOR</p>
                                {isDq ? <p className="text-2xl font-black text-red-600">DISKUALIFIKASI</p> : <p className="text-3xl font-black">{finalScore} <span className="text-sm font-medium text-slate-500">/ {maxPossibleScore}</span></p>}
                            </div>
                            <button onClick={handleSave} className="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg"><i className="fas fa-save mr-2"></i> Simpan Nilai</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
